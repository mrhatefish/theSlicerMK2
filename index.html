<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>p5 Fullscreen Image</title>
    <script src="https://cdn.jsdelivr.net/npm/p5@2.2.0/lib/p5.min.js"></script>
    <script src="timelines.js"></script>
    <style>
        :root {
            /* AMAZON */
            --amazon-orange: #FF9900;
            --amazon-dark: #232F3E;
            --amazon-white: #FFFFFF;

            /* CATERPILLAR */
            --cat-yellow: #FFCD11;
            --cat-black: #000000;
            --cat-white: #FFFFFF;

            /* GOOGLE */
            --google-blue: #4285F4;
            --google-red: #EA4335;
            --google-yellow: #FBBC05;
            --google-green: #34A853;
            --google-white: #FFFFFF;
            --google-dark: #202124;

            /* MICROSOFT */
            --ms-red: #F25022;
            --ms-green: #7FBA00;
            --ms-blue: #00A4EF;
            --ms-yellow: #FFB900;
            --ms-dark: #232323;
            --ms-white: #FFFFFF;

            /* OPENAI */
            --openai-black: #000000;
            --openai-white: #FFFFFF;
            --openai-grey: #343541;

            /* COCA-COLA */
            --coke-red: #F40009;
            --coke-black: #000000;
            --coke-white: #FFFFFF;
            --coke-silver: #C0C0C0;

            /* McDONALD'S */
            --mc-yellow: #FFC72C;
            --mc-red: #DA291C;
            --mc-dark: #27251F;
            --mc-white: #FFFFFF;

            /* NVIDIA */
            --nvidia-green: #76B900;
            --nvidia-black: #000000;
            --nvidia-white: #FFFFFF;
            --nvidia-silver: #A0A0A0;

            /* PALANTIR */
            --palantir-black: #000000;
            --palantir-dark: #1A1A1A;
            --palantir-white: #FFFFFF;
            --palantir-grey: #6B6B6B;

            /* TESLA */
            --tesla-red: #E82127;
            --tesla-black: #000000;
            --tesla-white: #FFFFFF;
            --tesla-grey: #393C41;

            /* BOEING */
            --boeing-blue: #1D4F8C;
            --boeing-dark: #00205B;
            --boeing-white: #FFFFFF;
            --boeing-grey: #7D8083;
        }

        @font-face {
            font-family: 'Google Sans Flex';
            src: url('assets/GoogleSansFlex.ttf') format('truetype');
        }

        body {
            font-family: 'GoogleSansFlex', sans-serif;
            overflow: hidden !important;
        }

        #defaultCanvas0 {
            overflow: hidden !important;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 500;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: rgba(0, 0, 0, 0.0);
        }

        .modal.open {
            display: block;
            /* default */
        }

        .modal.open.flex {
            display: flex;
            /* only when flex class is also present */
        }

        .modal.close {
            display: none !important;
        }

        .modal.flex {
            /*display: flex;*/
            justify-content: center;
            /* horizontal */
            align-items: center;
            /* vertical */

        }

        .blackCircle {
            width: 45vw;
            height: 45vw;
            background: black;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(50%, -50%);
            animation: pulse 29s ease-in-out infinite;
            -webkit-box-shadow: 0px 0px 22px 5px #2E2E2E;
            box-shadow: 0px 0px 22px 5px #2E2E2E;
        }

        @keyframes pulse {
            0% {
                transform: translate(-50%, -50%) scale(1.1);
            }

            50% {
                transform: translate(-50%, -50%) scale(1.15);
            }

            100% {
                transform: translate(-50%, -50%) scale(1.1);
            }
        }

        .redCircle {
            width: 47vw;
            height: 47vw;
            background: red;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .txtReplaceableItems {
            font-style: italic;
            font-weight: 700;
            font-size: 12vw;
            color: white;
            z-index: 400 !important;
        }

        #txtReplaceableItems {
            z-index: 650 !important;

        }

        .txtYouAreMagenta {

            font-weight: 900;
            font-size: 20vw;
            color: rgb(252, 71, 183, 1);

        }

        #txtYouAreMagenta {
            z-index: 450;
        }

        .fade-in {
            opacity: 1;
            animation-name: fadeInOpacity;
            animation-iteration-count: 1;
            animation-timing-function: ease-in;
            animation-duration: 10s;
        }

        @keyframes fadeInOpacity {
            0% {
                opacity: 0;
            }

            80% {
                opacity: 0.90;
            }

            100% {
                opacity: 1;
            }
        }

        #eightHours {
            color: var(--coke-silver);
            font-size: 8vw;
        }

        #eightHours div {
            width: 100%;
            height: 33%;
            display: flex;
            align-items: center;
            /* vertical center */
        }

        @keyframes tickerLeft {
            from {
                transform: translateX(100vw);
            }

            to {
                transform: translateX(-100%);
            }
        }

        @keyframes tickerRight {
            from {
                transform: translateX(-100%);
            }

            to {
                transform: translateX(100vw);
            }
        }
    </style>
</head>

<body style="margin:0; overflow:hidden;">
    <script>


        //pavePics
        let pavePicsSquares = [];


        //alternateText

        let altTextIndex = 0;
        let altColorIndex = 0;
        let altTextSwitch = 0;

        //slicer function
        let slicerLastChange = 0;
        let slicerSliceWidth = 1;

        // ─── TIMELINE STATE ───────────────────────────────────────────────
        let timeline = TL_DEFAULT; //loads the default timeline from timelines.js 
        let startTime;
        let totalTime;
        let elapsedTime = 0;
        let currentStep = -1;

        // ─── ALTERNATE IMAGE STATE ────────────────────────────────────────
        let altIndex = 0;
        let lastSwitch = 0;

        // ─── PARTICLES ────────────────────────────────────────────────────
        let particles = [];

        // ─── IMAGE PRELOAD ────────────────────────────────────────────────
        let loading = true;
        let imageMap = {};

        //----AUDIO
        let audAnalyser = null;
        let audData = null;
        let audBassMax = 0;
        let audMidMax = 0;
        let audHighMax = 0;
        let AUD_centroid = 0
        let audCentroidMax = 0.001;  // small value to avoid division by zero on startup
        let AUD_centroid_norm = 0;  // global

        let rawImages = `
        1-nasci.jpg
        2-cresci.jpg
        3-lavora.jpg
        4-consuma.jpg
        5-muori.jpg
        BEFORE-YOU-DIE.jpg
        BUY-3.jpg
        BUY-pink.jpg
        BUY.jpg
        circleBerni.jpg
        circleBlack.jpg
        circleWhite.jpg
        die.jpg
        thenDie.jpg
        amazon.jpg
        caterpillar.jpg
        google.jpg
        microsoft.jpg
        openAI.jpg
        bo.jpg
        coke.jpg
        macdonalds.jpg
        nvidia.jpg
        palantir.jpg
        apple.jpg
        bayer.jpg
        danone.jpg
        disney.jpg
        exxon.jpg
        gnamo.jpg
        meta.jpg
        monsanto.jpg
        nestle.jpg
        netflix.jpg
        shell.jpg
        spotify.jpg
        tesla.jpg
        tiktok.jpg
        x.jpg
        time0100.png
        time0200.png
        time0300.png
        time0400.png
        time0500.png
        time0600.png
        time0700.png
        time0800.png
        time0900.png
        time1000.png
        time1100.png
        time1200.png
        time1300.png
        time1400.png
        time1500.png
        time1600.png
        time1700.png
        time1800.png
        time1900.png
        time2000.png
        time2100.png
        time2200.png
        time2300.png
        time2400.png
    `;


        let imagesArr = rawImages.split('\n').map(f => f.trim()).filter(f => f.length > 0);

        // ─── VIDEO PRELOAD ────────────────────────────────────────────────
        let videoMap = {};
        let rawVideos = `
        detectPeopleAbove_002_fixed.mp4
        detectPeopleSub_002_fixed.mp4
    `;
        let videosArr = rawVideos.split('\n').map(f => f.trim()).filter(f => f.length > 0);

        // ─── VIDEO JUMP TIMER ─────────────────────────────────────────────
        let jumpInterval = 3000;
        let lastJump = 0;

        //------- PAVE function stuff
        let paveSquares = [];
        //------- blackHoleParticlesArr function stuff
        let blackHoleParticlesArr = [];

        // ─────────────────────────────────────────────────────────────────
        // HELPERS
        // ─────────────────────────────────────────────────────────────────

        function getImage(name) {
            return imageMap[name];
        }

        function getVideo(name) {
            return videoMap[name];
        }

        function loadImageAsync(path) {
            return new Promise((resolve, reject) => {
                loadImage(path, resolve, reject);
            });
        }

        function newParticle() {
            let r = min(windowWidth, windowHeight) * 0.28;
            return [
                random(TWO_PI),           // [0] angle
                r + random(10, 5000),     // [1] dist
                random(0.0002, 0.0020),   // [2] speed
                random(1, 4),             // [3] size
                random(20, 70),           // [4] alpha
                random(TWO_PI)            // [5] alphaOffset
            ];
        }

        function modalManager(modalID, closeModals) {
            const modals = document.querySelectorAll(".modal");
            if (closeModals > 0) {
                for (let i = 0; i < modals.length; i++) {
                    modals[i].classList.remove("open");
                }
            }
            if (modalID) {
                const modal = document.getElementById(modalID);
                if (modal) modal.classList.add("open");
            }
        }

        function pauseAllVideos() {
            for (let name of videosArr) {
                let v = videoMap[name];
                if (v && v.elt) v.pause();
            }
        }


        // ─────────────────────────────────────────────────────────────────
        // IMAGEFX
        // ─────────────────────────────────────────────────────────────────

        const ImageFX = {

            showImage(img, modalID, closeModals) {
                if (!img) {
                    console.error("IMG IS UNDEFINED");
                    background(255, 0, 0);
                    return;
                }
                if (!img.width || !img.height) {
                    console.error("IMG NOT READY:", img);
                    background(0, 0, 255);
                    return;
                }
                modalManager(modalID, closeModals);

                let canvasRatio = width / height;
                let imgRatio = img.width / img.height;
                let drawWidth, drawHeight;

                if (imgRatio > canvasRatio) {
                    drawWidth = width;
                    drawHeight = width / imgRatio;
                } else {
                    drawHeight = height;
                    drawWidth = height * imgRatio;
                }

                let x = (width - drawWidth) / 2;
                let y = (height - drawHeight) / 2;
                image(img, x, y, drawWidth, drawHeight);
            },

            alternateImage(imgsArr, speed, modalID, closeModals) {
                modalManager(modalID, closeModals);

                let mode = imgsArr[0];          // "forward", "backward", "random", "pingpong"
                let images = imgsArr.slice(1);    // actual images array

                if (millis() - lastSwitch > speed) {
                    lastSwitch = millis();

                    switch (mode) {
                        case "FORWARD":
                            altIndex = (altIndex + 1) % images.length;
                            break;
                        case "BACKWARD":
                            images = images.reverse();
                            altIndex = (altIndex + 1) % images.length;
                            break;
                        case "RANDOM":
                            altIndex = floor(random(images.length));
                            break;

                        default:
                            altIndex = (altIndex + 1) % images.length;  // fallback to forward
                    }
                }
                ImageFX.showImage(getImage(images[altIndex]), null, 0);

            },

            slicerImage(imgA, imgB, noise, lineweight, modalID, closeModals) {
                colorMode(RGB);  // 👈
                background(0);
                var n = noise;
                var lw = lineweight;

                modalManager(modalID, closeModals);
                let morphAmount = (sin(frameCount * 0.1) + 1) / 2;

                push();
                tint(255, 255 * (1 - morphAmount));
                image(imgA, 0, 0, width, height);
                tint(255, 255 * morphAmount);
                image(imgB, 0, 0, width, height);
                pop();

                if (frameCount - slicerLastChange > 4 + random(1, 3)) {
                    slicerSliceWidth = lw;
                    slicerLastChange = frameCount;
                }

                let numSlices = width / slicerSliceWidth;
                for (let i = 0; i < numSlices; i++) {
                    let x = i * slicerSliceWidth;
                    if (i % 2 === 0) {
                        image(imgB, x + n * random(1, 2), 0, slicerSliceWidth, height,
                            x * (imgB.width / width), 0,
                            slicerSliceWidth * (imgB.width / width), imgB.height);
                    }
                }
                colorMode(HSB, 360, 100, 100, 100);  // 👈
            },
            pavePics(N, images, cropAmount) {
                // args: [N, ["img1.jpg","img2.jpg",...], cropAmount]
                // N:          target number of cells e.g. 200
                // images:     array of image filenames
                // cropAmount: center crop % e.g. 0.5 = center 50%
                // timeline example:
                // { time: 10000, action: "pavePics", args: [200, ["amazon.jpg","google.jpg"], 0.5], mod: [null, 0], continuous: true }

                if (pavePicsSquares.length === 0) {
                    let s = Math.sqrt((width * height) / N);
                    let cols = Math.floor(width / s);
                    let rows = Math.floor(height / s);

                    for (let row = 0; row < rows; row++) {
                        for (let col = 0; col < cols; col++) {
                            pavePicsSquares.push({
                                x: col * s,
                                y: row * s,
                                size: s,
                                imgIndex: Math.floor(Math.random() * images.length),
                                speed: random(200, 1000),
                                lastSwitch: random(1000)
                            });
                        }
                    }
                }

                noStroke();
                for (let sq of pavePicsSquares) {
                    if (millis() - sq.lastSwitch > sq.speed) {
                        sq.imgIndex = Math.floor(Math.random() * images.length);
                        sq.lastSwitch = millis();
                    }

                    // black background for cell
                    fill(0);
                    noStroke();
                    rect(sq.x, sq.y, sq.size, sq.size);

                    let img = getImage(images[sq.imgIndex]);
                    if (!img) continue;

                    let sw = img.width * cropAmount;
                    let sh = img.height * cropAmount;
                    let sx = (img.width - sw) / 2;
                    let sy = (img.height - sh) / 2;

                    let imgRatio = sw / sh;
                    let dw, dh;
                    if (imgRatio > 1) {
                        dw = sq.size;
                        dh = sq.size / imgRatio;
                    } else {
                        dh = sq.size;
                        dw = sq.size * imgRatio;
                    }

                    let dx = sq.x + (sq.size - dw) / 2;
                    let dy = sq.y + (sq.size - dh) / 2;

                    image(img, dx, dy, dw, dh, sx, sy, sw, sh);
                }
            }


        };


        // ─────────────────────────────────────────────────────────────────
        // VIDEOFX
        // ─────────────────────────────────────────────────────────────────

        const VideoFX = {

            showVideo(vid, modalID, closeModals) {
                if (!vid || !vid.elt) {
                    console.warn("VIDEO NOT READY");
                    return;
                }
                // start playing if not already
                if (vid.elt.paused) vid.play();

                modalManager(modalID, closeModals);

                let canvasRatio = width / height;
                let vidRatio = vid.elt.videoWidth / vid.elt.videoHeight;
                let drawWidth, drawHeight;

                // if (vidRatio > canvasRatio) {
                //     /*                     drawWidth = width;
                //                         drawHeight = width / vidRatio; */
                // } else {
                //     drawHeight = height;
                //     drawWidth = height * vidRatio;
                // }

                drawHeight = height;
                drawWidth = height * vidRatio;

                let x = (width - drawWidth) / 2;
                let y = (height - drawHeight) / 2;
                image(vid, x, y, drawWidth, drawHeight);
            }
        };


        // ─────────────────────────────────────────────────────────────────
        // GEN
        // ─────────────────────────────────────────────────────────────────

        const Gen = {

            rect() {
                background(125);
                rectMode(CENTER);
                fill("green");
                noStroke();
                rect(width / 2, height / 2, 200, 100);
            },

            circleHaze(modalID, closeModals) {
                modalManager(modalID, closeModals);
                background(0, 0, 4);

                let cx = width / 2;
                let cy = height / 2;
                let r = min(width, height) * 0.28;
                let t = millis() * 0.001;

                for (let i = 6; i >= 1; i--) {
                    let pulse = sin(t * 0.8 + i * 0.4) * 0.5 + 0.5;
                    let haze = r + i * 18 + pulse * 22;
                    let alpha = map(i, 6, 1, 4, 18) * pulse;
                    noStroke();
                    fill(200, 8, 98, alpha);
                    circle(cx, cy, haze * 2);
                }

                let glowPulse = sin(t * 1.2) * 0.5 + 0.5;
                for (let g = 12; g >= 1; g--) {
                    let glowR = r + g * 3;
                    let glowA = map(g, 12, 1, 1, 12) * (0.4 + glowPulse * 0.6);
                    fill(210, 5, 100, glowA);
                    circle(cx, cy, glowR * 2);
                }

                noStroke();
                fill(210, 6, 99, 100);
                circle(cx, cy, r * 2);
            },

            circleHazeParticle() {
                background(0, 0, 4);

                let cx = width / 2;
                let cy = height / 2;
                let r = min(width, height) * 0.28;
                let t = millis() * 0.001;

                noStroke();
                for (let p of particles) {
                    p[0] += p[2];  // angle += speed
                    let px = cx + cos(p[0]) * p[1];
                    let py = cy + sin(p[0]) * p[1];
                    let flicker = sin(t * p[2] * 100 + p[5]) * 0.5 + 0.5;
                    let a = p[4] * flicker;
                    fill(205, 10, 100, a);
                    circle(px, py, p[3]);
                }

                fill(210, 6, 99, 100);
                circle(cx, cy, r * 2);

                fill(200, 3, 100, 60);
                circle(cx - r * 0.18, cy - r * 0.18, r * 0.7);
            },
            pave(N, colors) {
                // init once when paveSquares is empty
                if (paveSquares.length === 0) {
                    let s = Math.sqrt((width * height) / N);
                    let cols = Math.floor(width / s);
                    let rows = Math.floor(height / s);

                    for (let row = 0; row < rows; row++) {
                        for (let col = 0; col < cols; col++) {
                            paveSquares.push({
                                x: col * s,
                                y: row * s,
                                size: s,
                                colorIndex: Math.floor(Math.random() * colors.length),
                                speed: random(200, 1000),
                                lastSwitch: random(1000)   // stagger so they don't all change at once
                            });
                        }
                    }
                }

                // draw every frame
                colorMode(RGB);  // hex colors need RGB
                noStroke();
                for (let sq of paveSquares) {
                    if (millis() - sq.lastSwitch > sq.speed) {
                        //sq.colorIndex = (sq.colorIndex + 1) % colors.length;
                        sq.colorIndex = Math.floor(Math.random() * colors.length);
                        sq.lastSwitch = millis();
                    }
                    fill(colors[sq.colorIndex]);
                    rect(sq.x, sq.y, sq.size, sq.size);
                }
                colorMode(HSB, 360, 100, 100, 100);  // restore for everything else
            },
            showText(bgColor, textColor, fontSize, txt) {
                // args: [bgColor, textColor, fontSize, txt]
                // bgColor:   hex string e.g. "#000000"
                // textColor: hex string e.g. "#FFFFFF"
                // fontSize:  % of canvas height e.g. 0.15 = 15%
                // txt:       string e.g. "REPLACEABLE"
                // timeline example:
                // { time: 5000, action: "showText", args: ["#000000", "#FFFFFF", 0.15, "REPLACEABLE"], mod: [null, 0], continuous: false }
                colorMode(RGB);
                background(bgColor);
                fill(textColor);
                noStroke();
                textAlign(CENTER, CENTER);
                textSize(height * fontSize);
                textFont('Google Sans Flex');
                text(txt, width / 2, height / 2);
                colorMode(HSB, 360, 100, 100, 100);
            },
            alternateText(texts, colors, fontSize, speed) {
                // args: [["txt1","txt2",...], ["#color1","#color2",...], fontSize, speedMs]
                // texts:    array of strings — cycles FORWARD
                // colors:   array of hex — fgColor and bgColor offset by 1
                //           different lengths from texts creates polyrhythm effect
                // fontSize: % of canvas height e.g. 0.15
                // speedMs:  ms per switch e.g. 200
                // timeline example:
                // { time: 10000, action: "alternateText", args: [["REPLACEABLE","DISPOSABLE"], ["#FFFFFF","#FF0000","#4285F4"], 0.15, 200], mod: [null, 0], continuous: true }

                if (millis() - altTextSwitch > speed * randomGaussian(1, 0.2)) {
                    altTextIndex = (altTextIndex + 1) % texts.length;
                    altColorIndex = (altColorIndex + 1) % colors.length;
                    altTextSwitch = millis();
                }

                let txt = texts[altTextIndex];
                let fgColor = colors[altColorIndex];
                let bgColor = colors[(altColorIndex + 1) % colors.length];

                colorMode(RGB);
                background(bgColor);
                fill(fgColor);
                noStroke();
                textAlign(CENTER, CENTER);
                textSize(height * fontSize);
                textFont('Google Sans Flex');
                text(txt, width / 2, height / 2);
                colorMode(HSB, 360, 100, 100, 100);
            },

            blackHoleParticles() {
                for (let i = 0; i < 300; i++) {
                    let p = new Particle();
                    blackHoleParticlesArr.push(p);
                }
                for (let i = blackHoleParticlesArr.length - 1; i >= 0; i--) {
                    blackHoleParticlesArr[i].update();
                    blackHoleParticlesArr[i].show();
                    if (blackHoleParticlesArr[i].finished()) {
                        blackHoleParticlesArr.splice(i, 1);
                    }
                }

            }

        };


        // ─────────────────────────────────────────────────────────────────
        // DISPATCH
        // ─────────────────────────────────────────────────────────────────

        function dispatch(step) {
            const { action, args, mod } = timeline[step];
            switch (action) {
                case "showImage":
                    ImageFX.showImage(getImage(args[0]), mod[0] ?? null, mod[1] ?? 0);
                    break;
                case "alternateImage":
                    ImageFX.alternateImage(args[0], args[1], mod[0] ?? null, mod[1] ?? 0);
                    break;
                case "slicerImage":
                    ImageFX.slicerImage(getImage(args[0]), getImage(args[1]), args[2], args[3], mod[0] ?? null, mod[1] ?? 0);
                    break;
                case "rect":
                    Gen.rect();
                    break;
                case "circleHaze":
                    Gen.circleHaze(mod[0] ?? null, mod[1] ?? 0);
                    break;
                case "circleHazeParticle":
                    Gen.circleHazeParticle();
                    break;
                case "showVideo":
                    VideoFX.showVideo(getVideo(args[0]), mod[0] ?? null, mod[1] ?? 0);
                    break;
                case "pave":
                    Gen.pave(args[0], args[1]);
                    break;
                case "showText":
                    Gen.showText(args[0], args[1], args[2], args[3]);
                    break;
                case "pavePics":
                    ImageFX.pavePics(args[0], args[1], args[2]);
                    break;
                case "alternateText":
                    Gen.alternateText(args[0], args[1], args[2], args[3]);
                    break;
                case "blackHoleParticles":
                    Gen.blackHoleParticles();
                    break;

            }
        }



        // ─────────────────────────────────────────────────────────────────
        // SETUP
        // ─────────────────────────────────────────────────────────────────

        async function setup() {
            initMIDI();
            initAudio();
            let cnv = createCanvas(windowWidth, windowHeight);
            cnv.style('z-index', '1');
            colorMode(HSB, 360, 100, 100, 100);

            // spawn particles
            for (let i = 0; i < 4000; i++) {
                particles.push(newParticle());
            }

            // define timeline
            startTime = millis();
            //timeline = timeline1
            totalTime = timeline.reduce((acc, e) => acc + e.time, 0);

            // preload images
            try {
                let promises = imagesArr.map(name =>
                    loadImageAsync("assets/" + name)
                        .then(img => ({ name, img }))
                        .catch(err => { console.warn("Failed:", name); return null; })
                );
                let results = await Promise.all(promises);
                for (let r of results) {
                    if (r) imageMap[r.name] = r.img;
                }
            } finally {
                loading = false;
            }

            // preload videos — synchronous, no waiting
            for (let name of videosArr) {
                let v = createVideo("assets/" + name);
                v.hide();
                v.loop();
                v.volume(0);
                videoMap[name] = v;
            }
        }


        // ─────────────────────────────────────────────────────────────────
        // DRAW
        // ─────────────────────────────────────────────────────────────────

        function draw() {
            background(0);
            if (loading) return;
            updateAudio();
            elapsedTime = millis() - startTime;

            if (elapsedTime >= totalTime) {
                startTime = millis();
                elapsedTime = 0;
                currentStep = -1;
            }

            // timeline lookup
            let cursor = 0;
            for (let i = 0; i < timeline.length; i++) {
                if (elapsedTime >= cursor && elapsedTime < cursor + timeline[i].time) {
                    if (currentStep !== i) {
                        //alterate image reset:
                        altTextIndex = 0;
                        altColorIndex = 0;
                        altTextSwitch = 0;
                        //reset for slicer
                        slicerLastChange = 0;
                        slicerSliceWidth = 1;
                        currentStep = i;
                        altIndex = -1;  // reset for alternateImage, -1 otherwise skip the first image
                        lastSwitch = 0;  // reset for alternateImage
                        if (timeline[i].action !== "pave" &&
                            timeline[i].action !== "dots" &&
                            timeline[i].action !== "pavePics") {
                            paveSquares = [];
                            pavePicsSquares = [];

                        }

                        if (timeline[i].action === "pave" || timeline[i].action === "dots") {
                            let prevIndex = i > 0 ? i - 1 : timeline.length - 1;  // wrap to last step
                            let prevIsPave = timeline[prevIndex].action === "pave" ||
                                timeline[prevIndex].action === "dots" ||
                                timeline[prevIndex].action === "pavePics";
                            if (!prevIsPave || timeline[prevIndex].args[0] !== timeline[i].args[0]) {
                                paveSquares = [];
                            }
                        }



                        // pause all videos on step change — clean slate
                        pauseAllVideos();

                        if (!timeline[i].continuous) dispatch(i);  // one-shot
                    }
                    if (timeline[i].continuous) dispatch(i);       // every frame

                    break;
                }
                cursor += timeline[i].time;
            }

            // gaussian video jump timer — runs independently of timeline
            if (millis() - lastJump > jumpInterval) {
                lastJump = millis();
                jumpInterval = constrain(randomGaussian(3000, 800), 500, 8000);
                for (let name of videosArr) {
                    let v = videoMap[name];
                    if (v && v.elt && !v.elt.paused) {
                        v.time(random(v.duration()));
                    }
                }
            }
        }


        // ─────────────────────────────────────────────────────────────────
        // RESIZE
        // ─────────────────────────────────────────────────────────────────

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }

        // ─────────────────────────────────────────────────────────────────
        // MIDI
        // ─────────────────────────────────────────────────────────────────

        function initMIDI() {
            navigator.requestMIDIAccess().then(midi => {
                for (let input of midi.inputs.values()) {
                    console.log("MIDI input found:", input.name);
                    input.onmidimessage = (msg) => {
                        const [status, note, velocity] = msg.data;
                        // 144 = note on, velocity > 0 = actually pressed
                        if (status === 144 && velocity > 0) {
                            if (MIDI_MAP[note]) {
                                switchTimeline(MIDI_MAP[note]);
                                modalManager(null, 1);
                                console.log("switched to:", note);
                            }
                        }
                    };
                }
            }).catch(err => {
                console.warn("MIDI failed:", err);
            });
        }

        function switchTimeline(newTimeline) {
            pauseAllVideos();
            timeline = newTimeline;
            totalTime = newTimeline.reduce((acc, e) => acc + e.time, 0);
            startTime = millis();
            elapsedTime = 0;
            currentStep = -1;
            altIndex = 0;  // 👈 reset here
            lastSwitch = 0;  // 👈 and this too
        }


        // ─────────────────────────────────────────────────────────────────
        // AUDIO
        // ─────────────────────────────────────────────────────────────────

        async function initAudio() {
            // populate device list
            const devices = await navigator.mediaDevices.enumerateDevices();
            const inputs = devices.filter(d => d.kind === 'audioinput');
            const select = document.getElementById('audioInput');

            inputs.forEach(d => {
                let opt = document.createElement('option');
                opt.value = d.deviceId;
                opt.text = d.label || 'Input ' + d.deviceId.slice(0, 6);
                select.appendChild(opt);
            });

            // start button
            document.getElementById('audioStart').addEventListener('click', async () => {
                const deviceId = select.value;

                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: deviceId ? { deviceId: { ideal: deviceId } } : true
                });

                const ctx = new AudioContext();
                const source = ctx.createMediaStreamSource(stream);
                audAnalyser = ctx.createAnalyser();
                audAnalyser.fftSize = 1024;
                audData = new Uint8Array(audAnalyser.frequencyBinCount);
                source.connect(audAnalyser);

                // hide selector, show debug
                document.getElementById('audioSelector').style.top = '18px';
                document.getElementById('audioSelector').style.width = 'auto';
                document.getElementById('audioStart').style.display = 'none';
                document.getElementById('audioInput').style.display = 'none';
                document.getElementById('audDebug').style.display = 'block';

                console.log("AUDIO started:", deviceId);
            });
        }

        function updateAudio() {
            if (!audAnalyser || !audData) return;

            audAnalyser.getByteFrequencyData(audData);

            let binCount = audData.length;

            let weightedSum = 0;  // sum of (frequency * amplitude)
            let totalSum = 0;  // sum of amplitudes

            for (let i = 0; i < binCount; i++) {
                let v = audData[i] / 255.0;
                weightedSum += i * v;  // frequency bin weighted by amplitude
                totalSum += v;
            }

            // centroid — 0 = all bass, 1 = all highs
            AUD_amplitude = totalSum / binCount;
            AUD_centroid = totalSum > 0 ? (weightedSum / totalSum) / binCount : 0;

            // self-calibrating centroid max
            audCentroidMax = Math.max(audCentroidMax * 0.995, AUD_centroid);
            let AUD_centroid_norm = AUD_centroid / audCentroidMax;  // always 0-1 relative to peak

            // update debug
            document.getElementById('dbAmp').innerText = AUD_amplitude.toFixed(3);
            document.getElementById('dbCentroid').innerText = AUD_centroid_norm.toFixed(3);
        }

        // ─────────────────────────────────────────────────────────────────
        // Classes
        // ─────────────────────────────────────────────────────────────────

        class Particle {
            constructor() {
                let r = min(width, height) * 0.28;
                let angle = random(TWO_PI);

                // high centroid = tight spawn, low centroid = fuzzy scatter
                let fuzz = map(AUD_centroid_norm, 0, 1, 0.3, 0.01);

                this.x = width / 2 + cos(angle) * r * randomGaussian(1, AUD_centroid);
                this.y = height / 2 + sin(angle) * r * randomGaussian(1, AUD_centroid);

                // high centroid = fast and precise, low = slow and random
                let speed = map(AUD_centroid_norm, 0, 1, 1, 6);
                let drift = map(AUD_centroid_norm, 0, 1, 1.5, 0.05); // low centroid = more random drift

                this.vx = cos(angle) * speed * randomGaussian(1, AUD_centroid);
                this.vy = sin(angle) * speed * randomGaussian(1, AUD_centroid);


                this.size = map(AUD_centroid_norm, 0, 1, 3, 1);

                // high centroid = bright white, low = dimmer and larger
                this.alpha = map(AUD_centroid, 0, 1, 120, 255);

                // color temperature — high = cold white, low = warm dim
                this.r = map(AUD_centroid, 0, 1, 180, 255);  // less red when bright
                this.g = map(AUD_centroid, 0, 1, 140, 255);
                this.b = map(AUD_centroid, 0, 1, 100, 255);  // more blue when bright = cold
            }

            finished() { return this.alpha < 100; }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= map(AUD_centroid, 0, 1, 1, 5);  // high centroid = faster fade
            }

            show() {
                noStroke();
                colorMode(RGB);
                fill(255, 255, 255, this.alpha);
                ellipse(this.x, this.y, this.size);
                colorMode(HSB, 360, 100, 100, 100);
            }
        }

    </script>
