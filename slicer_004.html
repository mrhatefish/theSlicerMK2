<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Morphing Slice Effect</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
</head>
<body>
    <script>
        let imgA, imgB;
        let sliceWidth = 1;
        let lastChange = 0;
        let morphAmount = 0; // 0 = full imgA, 1 = full imgB

        function preload() {
            imgA = loadImage('BUY-3.jpg');  
            imgB = loadImage('BEFORE-YOU-DIE.jpg');  
        }

        function setup() {
            createCanvas(windowWidth, windowHeight);
        }

        function draw() {
            background(0);
            
            // Smooth morphing using a sine wave (oscillates between 0 and 1)
            morphAmount = (sin(frameCount * 0.01) + 1) / 2;

            // Draw blended images using `tint()`
            push();
            tint(255, 255 * (1 - morphAmount)); // Fade out imgA
            image(imgA, 0, 0, width, height);
            tint(255, 255 * morphAmount); // Fade in imgB
            image(imgB, 0, 0, width, height);
            pop();

            // Randomly update slice width
            if (frameCount - lastChange > 4 + random(1, 3)) {
                sliceWidth = int(random(1, 3));
                lastChange = frameCount;
            }

            let numSlices = width / sliceWidth;

            // Overlay slices from imgB
            for (let i = 0; i < numSlices; i++) {
                let x = i * sliceWidth;
                if (i % 2 === 0) {
                    image(imgB, x + random(1,2), 0, sliceWidth, height, x * (imgB.width / width), 0, sliceWidth * (imgB.width / width), imgB.height);
                }
            }
        }
    </script>
</body>
</html>
